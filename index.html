<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Feliz Cumpleaños!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a; /* Fondo oscuro y elegante */
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden; /* Evita que la pantalla haga scroll en iPhone */
        }
        h1 {
            font-size: 2.5rem;
            text-align: center;
            animation: popIn 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            margin: 0 20px 10px 20px;
            background: linear-gradient(45deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.2rem;
            text-align: center;
            animation: fadeIn 2s ease-out 1s forwards;
            opacity: 0;
            padding: 0 30px;
            line-height: 1.5;
        }
        .confetti {
            position: absolute;
            width: 8px;
            height: 16px;
            animation: fall linear infinite;
            border-radius: 4px;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(720deg); }
        }
    </style>
</head>
<body>

    <h1>¡Feliz Cumpleaños! 🎉</h1>
    <p>Espero que tengas un día increíble, lleno de éxitos y buenas sorpresas. ¡Pásala genial!</p>

    <script>
        // Generador de confeti aleatorio
        const colors = ['#38bdf8', '#fbbf24', '#f43f5e', '#a78bfa', '#34d399'];
        for(let i = 0; i < 70; i++) {
            let confeti = document.createElement('div');
            confeti.className = 'confetti';
            confeti.style.left = Math.random() * 100 + 'vw';
            confeti.style.animationDuration = (Math.random() * 3 + 2) + 's';
            confeti.style.animationDelay = Math.random() * 5 + 's';
            confeti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.appendChild(confeti);
        }
    </script>
</body>
</html>
